version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auditflow-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=${DEBUG:-false}
    volumes:
      - checkpoints_data:/app/data
    networks:
      - auditflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Streamlit Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: auditflow-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auditflow-network
    command: streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0 --logger.level=info

networks:
  auditflow-network:
    driver: bridge

volumes:
  checkpoints_data:
    driver: local
